name: Publish CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: CLI version to download and publish (e.g. 1.4.0)
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          version: ${{ inputs.version }}
